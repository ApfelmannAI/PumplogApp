name: pumplog_flutter
description: PumpLog Flutter client (Auth via Authentik + same PumpLog API)
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.2
  flutter_appauth: ^6.0.3
  jwt_decoder: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
